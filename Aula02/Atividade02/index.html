<body>
    <h1>Cadastro  </h1> 
    <h2>Preencha os campos abaixo para criar sua conta</h2>
    <form action="sucesso.html"> 
        <label for="nome">Nome:</label>  <!-- label é o texto que aparece ao lado do campo de entrada -->
        <input type="text" id="nome" name="nome" ><br><br> <!-- input faz que usuário digite algo, required faz com que o campo seja obrigatório   -->

        <label for="sobrenome">Sobrenome:</label>
        <input type="text" id="sobrenome" name="sobrenome" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required><br><br>
        <label>Data de nascimento:</label>
<input type="date" name="data">
<br><br>
      <label>Gênero:</label>
<select name="genero">
    <option selected disabled>Selecione o gênero</option>
    <option>Masculino</option>
    <option>Feminino</option>
</select>

<br><br>

<label>Data de nascimento:</label>
<input type="date" name="data">
<br><br>
